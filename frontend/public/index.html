<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>LactaMap</title>
    <meta name="description" content="Encuentra lactarios, cambiadores y puntos de interés cerca de ti" />

    <!-- PWA manifest & theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f43f5e" />

    <!-- iOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LactaMap" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LactaMap" />
    <meta property="og:description" content="Encuentra lactarios, cambiadores y puntos de interés cerca de ti" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Expo / RN-Web reset -->
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para usar LactaMap.</noscript>
    <div id="root"></div>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
